scheduler:
- name: 每日記憶檔輪轉
  type: system
  action: rotate_memory_files
  trigger: daily
  hour: 0
  minute: 0
  second: 0
  active: true
- name: 全體 Agent 每小時記憶更新
  type: system
  action: update_agent_memories
  prompt: 過去一段時間所進行的任務的摘要及重點整理,於重點任務或重要轉折點則需紀錄細節,更新紀錄到memory目錄的當日記憶檔md
  trigger: interval
  hours: 1
  minutes: 0
  seconds: 0
  active: true
- name: 每日系統清理
  type: system
  action: cleanup_images
  trigger: daily
  hour: 2
  minute: 0
  second: 0
  active: true
- name: 週五周報
  type: agent_command
  agent: Güpa
  command: 本週完成了哪些重要的行程規劃，下週有什麼計畫
  trigger: weekly
  day_of_week: 4
  hour: 17
  minute: 0
  second: 0
  active: true
- name: 月初檢討
  type: agent_command
  agent: Güpa
  command: 生成上月的旅遊行程總結報告，統計完成率和滿意度
  trigger: monthly
  day: 1
  hour: 9
  minute: 0
  second: 0
  active: true
- name: 狀態輪詢
  type: agent_command
  agent: Chöd
  command: 檢查一下當前系統是否正常運行
  trigger: interval
  hours: 0
  minutes: 30
  seconds: 0
  active: false
- name: 中期狀態報告
  type: agent_command
  agent: Güpa
  command: 過去 12 小時有哪些重要的旅遊市場變化
  trigger: interval
  hours: 12
  minutes: 0
  seconds: 0
  active: false
- name: 工作日晨會
  type: agent_command
  agent: Chöd
  command: 準備今天的工作計畫和優先順序
  trigger: cron
  day_of_week: 0-4
  hour: 9
  minute: 0
  second: 0
  active: false
- name: 月末深度清理
  type: system
  action: cleanup_images
  trigger: cron
  day: L
  hour: 23
  minute: 59
  second: 0
  active: false
- name: 半月檢查
  type: agent_command
  agent: Güpa
  command: 進行本月上/下旬的進度檢查
  trigger: cron
  day: 1,15
  hour: 10
  minute: 0
  second: 0
  active: false
- name: 週末規劃
  type: agent_command
  agent: Güpa
  command: 規劃一下這個週末的旅遊行程
  trigger: cron
  day_of_week: 5,6
  hour: 10
  minute: 0
  second: 0
  active: false
- name: 工作日定期同步
  type: agent_command
  agent: Chöd
  command: 同步最新的行程進度
  trigger: cron
  day_of_week: 0-4
  hour: 9,13,17,21
  minute: 0
  second: 0
  active: false
- name: 中旬財務審核
  type: agent_command
  agent: Chöd
  command: 進行本月中旬的財務審核和預算調整
  trigger: cron
  day: '10'
  day_of_week: 0-4
  hour: 14
  minute: 0
  second: 0
  active: false
- name: 每日國際新聞
  type: agent_command
  agent: Güpa
  command: 搜尋並整理每日國際政治與經濟新聞摘要
  trigger: daily
  hour: 8
  minute: 0
  active: true
- name: War_Monitor_HighFreq
  type: agent_command
  agent: Güpa
  command: 【系統提示】請嚴格依照知識庫中的 WAR_REPORT_PROTOCOL.md 規範執行美伊戰爭 30 分鐘「絕對累積迭代」與「高強度核實」監控任務。⚠️
    時間戳規範：嚴禁人為推算或預設時間，所有 🆕 標註必須使用執行當下的精確系統時間。
  trigger: interval
  minutes: 30
  active: true
